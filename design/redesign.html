<!DOCTYPE html>
<html lang="ru" data-style="v1" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOMPASS — Дизайн-концепт</title>
<style>
:root{
  --r:14px; --r-s:10px; --r-l:20px;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
/* ---------- ПАЛИТРЫ: стиль × тема ---------- */
html[data-style="v1"][data-theme="dark"]{
  --bg:#0A1729;--panel:#0F2038;--card:#14273F;--card2:#1A3050;--line:#243d5c;
  --tx:#EAF1FB;--mut:#90A6C5;--acc:#3B82F6;--acc2:#3B82F6;--acc-s:rgba(59,130,246,.16);
  --ok:#37C08B;--ok-s:rgba(55,192,139,.16);--warn:#E0A83B;--warn-s:rgba(224,168,59,.16);
  --danger:#E5484D;--danger-s:rgba(229,72,77,.14);--violet:#8B7CF6;--violet-s:rgba(139,124,246,.16);
  --m1:#D7DFE8;--m2:#7f8 da;--m2:#7F8DA0;--logo:linear-gradient(145deg,#EDF2F7,#9AA7B8 55%,#5E6B7D);
}
html[data-style="v1"][data-theme="light"]{
  --bg:#EDF2F8;--panel:#FFFFFF;--card:#FFFFFF;--card2:#F4F8FC;--line:#E3EAF3;
  --tx:#102039;--mut:#61748F;--acc:#2E6BE6;--acc2:#2E6BE6;--acc-s:rgba(46,107,230,.10);
  --ok:#12A971;--ok-s:rgba(18,169,113,.12);--warn:#B9820F;--warn-s:rgba(200,140,20,.14);
  --danger:#D93A3F;--danger-s:rgba(217,58,63,.10);--violet:#6D5CE0;--violet-s:rgba(109,92,224,.12);
  --m1:#4A5A6E;--m2:#8persist;--m2:#8A98AB;--logo:linear-gradient(145deg,#8A97A8,#5A6alt);--logo:linear-gradient(145deg,#9AA7B8,#5E6B7D);
}
html[data-style="v2"][data-theme="dark"]{
  --bg:#0B1A2F;--panel:#10233C;--card:#14263F;--card2:#1A3050;--line:#22405f;
  --tx:#EAF1FB;--mut:#90A6C5;--acc:#3E6CBB;--acc2:#DA2A32;--acc-s:rgba(62,108,187,.18);
  --ok:#37C08B;--ok-s:rgba(55,192,139,.16);--warn:#E0A83B;--warn-s:rgba(224,168,59,.16);
  --danger:#E5484D;--danger-s:rgba(229,72,77,.14);--violet:#8B7CF6;--violet-s:rgba(139,124,246,.16);
  --m1:#EDF2F7;--m2:#9AA7B8;--logo:linear-gradient(140deg,#3E6CBB,#1B3strap);--logo:linear-gradient(140deg,#5A86D6 0%,#20365F 60%,#DA2A32 130%);
}
html[data-style="v2"][data-theme="light"]{
  --bg:#F5F9FC;--panel:#FFFFFF;--card:#FFFFFF;--card2:#F3F8FC;--line:#E5ECF3;
  --tx:#12233B;--mut:#5F7690;--acc:#20407A;--acc2:#D8232A;--acc-s:rgba(32,64,122,.10);
  --ok:#12A971;--ok-s:rgba(18,169,113,.12);--warn:#B9820F;--warn-s:rgba(200,140,20,.14);
  --danger:#D93A3F;--danger-s:rgba(217,58,63,.10);--violet:#6D5CE0;--violet-s:rgba(109,92,224,.12);
  --m1:#20407A;--m2:#7C8DA6;--logo:linear-gradient(140deg,#20407A 0%,#20365F 55%,#D8232A 130%);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;transition:background .25s}
/* ---------- Верхняя панель управления ---------- */
.controls{position:sticky;top:0;z-index:50;display:flex;gap:20px;align-items:center;flex-wrap:wrap;
  padding:14px 26px;background:color-mix(in srgb,var(--panel) 88%,transparent);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line)}
.controls .brandmini{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.06em;font-size:15px;margin-right:auto}
.seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:4px}
.seg button{border:0;background:transparent;color:var(--mut);font:inherit;font-size:13px;font-weight:600;
  padding:7px 16px;border-radius:999px;cursor:pointer;transition:.15s;white-space:nowrap}
.seg button.on{background:var(--acc);color:#fff}
html[data-style="v2"] .seg button.on{background:var(--acc)}
.seg .lbl{color:var(--mut);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:7px 10px 7px 4px}
.wrap{max-width:1280px;margin:0 auto;padding:34px 26px 90px}
.sec-h{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--mut);margin:46px 0 18px;display:flex;align-items:center;gap:12px}
.sec-h::after{content:"";flex:1;height:1px;background:var(--line)}
.sec-h:first-child{margin-top:0}
/* ---------- Бренд ---------- */
.brandrow{display:flex;gap:26px;flex-wrap:wrap;align-items:stretch}
.brandcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r-l);padding:30px;flex:1;min-width:280px;position:relative;overflow:hidden}
.logolock{display:flex;align-items:center;gap:16px}
.logomark{width:60px;height:60px;flex:none;filter:drop-shadow(0 4px 14px rgba(0,0,0,.35))}
.logotext{font-size:30px;font-weight:800;letter-spacing:.14em;background:var(--logo);-webkit-background-clip:text;background-clip:text;color:transparent}
.logotag{font-size:11px;letter-spacing:.22em;color:var(--mut);font-weight:600;margin-top:4px}
.pal{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
.sw{width:52px;height:52px;border-radius:12px;border:1px solid rgba(255,255,255,.08);position:relative}
.sw span{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--mut)}
.icongrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:14px;margin-top:6px}
.icell{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 10px;text-align:center}
.icell .ic{width:34px;height:34px;margin:0 auto 9px;display:flex;align-items:center;justify-content:center;border-radius:11px}
.icell small{font-size:10.5px;color:var(--mut);line-height:1.3;display:block}
/* ---------- Общие мокап-компоненты ---------- */
.frameLabel{font-size:12px;font-weight:700;color:var(--mut);margin:0 0 10px 4px;letter-spacing:.04em}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:999px;white-space:nowrap}
.badge-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
/* ---------- Панель оператора ---------- */
.panelMock{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:var(--r-l);overflow:hidden;min-height:620px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.pSide{width:236px;flex:none;background:var(--panel);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;gap:4px}
.pSide .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 14px;border-bottom:1px solid var(--line);margin-bottom:8px}
.pSide .brand b{font-weight:800;letter-spacing:.1em;font-size:15px}
.pUser{padding:6px 10px 14px}
.pUser b{font-size:14px}.pUser small{display:block;color:var(--mut);font-size:11.5px;margin-top:2px}
.pGroup{font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--mut);text-transform:uppercase;padding:12px 10px 6px}
.pItem{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--r-s);color:var(--mut);font-size:13.5px;font-weight:500;cursor:pointer}
.pItem svg{width:17px;height:17px;flex:none}
.pItem .cnt{margin-left:auto;background:var(--acc2);color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.pItem.on{background:var(--acc-s);color:var(--acc)}
html[data-style="v2"] .pItem.on{color:var(--tx);background:var(--acc-s)}
.pItem.on svg{color:var(--acc)}
.pMain{flex:1;padding:26px 28px;overflow:auto}
.pTitle{font-size:26px;font-weight:800;letter-spacing:-.01em}
.pSub{color:var(--mut);font-size:14px;margin-top:2px}
.pBtn{background:var(--acc);color:#fff;border:0;font:inherit;font-weight:700;font-size:13.5px;padding:11px 18px;border-radius:var(--r-s);cursor:pointer;float:right;margin-top:-42px}
.filters{display:flex;gap:8px;margin:18px 0;flex-wrap:wrap}
.filt{background:var(--card);border:1px solid var(--line);color:var(--tx);font-size:13px;font-weight:600;padding:8px 15px;border-radius:999px;display:flex;align-items:center;gap:7px}
.filt.on{background:var(--acc);color:#fff;border-color:transparent}
.filt .n{background:var(--acc2);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.filt.on .n{background:rgba(255,255,255,.25)}
.tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:0}
.tab{font-size:13.5px;font-weight:600;color:var(--mut);padding:9px 14px;border-radius:var(--r-s) var(--r-s) 0 0;cursor:pointer}
.tab.on{color:var(--tx);background:var(--card);border:1px solid var(--line);border-bottom-color:var(--card);margin-bottom:-1px}
.qcard{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.qcard.flag{border-color:var(--danger);background:var(--danger-s)}
.av{width:44px;height:44px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:16px;background:var(--acc)}
.qinfo{min-width:0;flex:1}
.qname{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.qname b{font-size:14.5px}
.qmeta{color:var(--mut);font-size:12px;margin-top:3px}
.qright{display:flex;align-items:center;gap:10px;flex:none}
.qstatus{font-size:12.5px;font-weight:600;color:var(--mut)}
.qassign{display:flex;align-items:center;gap:6px;background:var(--acc-s);color:var(--acc);font-size:12.5px;font-weight:700;padding:7px 12px;border-radius:var(--r-s)}
/* ---------- Телефоны ---------- */
.phones{display:flex;gap:26px;flex-wrap:wrap}
.phone{width:300px;flex:none;background:var(--card);border-radius:38px;border:1px solid var(--line);padding:12px;box-shadow:0 24px 55px rgba(0,0,0,.30)}
.screen{background:var(--bg);border-radius:28px;overflow:hidden;height:640px;display:flex;flex-direction:column;position:relative}
.stat{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 6px;font-size:12px;font-weight:700;color:var(--tx)}
.scr{flex:1;overflow:auto;padding:6px 18px 14px}
.scr::-webkit-scrollbar{display:none}
.appbar{display:flex;align-items:center;justify-content:center;padding:8px 0 14px;font-weight:800;font-size:17px;position:relative}
.hi small{color:var(--mut);font-size:14px}
.hi h2{font-size:26px;font-weight:800;margin:2px 0}
.hi .loc{color:var(--mut);font-size:12.5px;display:flex;align-items:center;gap:4px}
.hero{border-radius:var(--r-l);height:150px;margin:16px 0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 140% at 70% 20%,color-mix(in srgb,var(--acc) 55%,#000) 0%,#0A1526 75%)}
html[data-style="v2"] .hero{background:radial-gradient(130% 150% at 72% 25%,#20365F 0%,#0A1526 80%)}
.hero .ring{position:absolute;inset:0;opacity:.5}
.dots{display:flex;gap:6px;justify-content:center;margin-top:-8px}
.dots i{width:7px;height:7px;border-radius:50%;background:var(--line)}
.dots i.on{width:20px;border-radius:4px;background:var(--acc)}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px}
.tile .ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.tile b{font-size:17px}.tile small{display:block;color:var(--mut);font-size:11.5px;margin-top:2px}
.promo{background:var(--acc-s);border:1px solid color-mix(in srgb,var(--acc) 30%,transparent);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.promo .pc{width:38px;height:38px;border-radius:50%;border:3px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--acc);flex:none}
.promo b{color:var(--acc);font-size:13px}
.office{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px}
.office .oh{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;margin-bottom:12px}
.office .addr{color:var(--mut);font-size:12.5px;display:flex;gap:7px;margin-bottom:10px}
.office .tel{color:var(--ok);font-weight:700;font-size:15px;display:flex;align-items:center;gap:9px;margin:7px 0}
.office .hrs{color:var(--mut);font-size:12.5px;line-height:1.7;margin-top:8px}
.nav{display:flex;justify-content:space-around;padding:10px 6px 8px;border-top:1px solid var(--line);background:var(--panel)}
.nav a{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--mut);font-size:10px;font-weight:600}
.nav a.on{color:var(--acc)}
.nav a svg{width:21px;height:21px}
.list-h{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:16px 4px 8px}
.row{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px}
.row .ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none}
.row .rt{flex:1;min-width:0}
.row .rt b{font-size:15px}.row .rt small{display:block;color:var(--mut);font-size:12px;margin-top:2px}
.row .chev{color:var(--mut)}
.segtabs{display:flex;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:5px;margin:6px 0 14px}
.segtabs div{flex:1;text-align:center;font-size:13.5px;font-weight:700;color:var(--mut);padding:9px;border-radius:8px}
.segtabs div.on{background:var(--acc);color:#fff}
.fab{position:absolute;right:18px;bottom:78px;background:var(--acc);color:#fff;border-radius:16px;padding:14px 20px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;box-shadow:0 10px 26px color-mix(in srgb,var(--acc) 45%,transparent)}
.plan{display:flex;gap:10px;justify-content:center;margin:14px 0}
.plan .p{font-size:13px;font-weight:700;padding:9px 18px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}
.plan .p.on{background:var(--acc-s);color:var(--acc);border-color:transparent}
.logout{border:1px solid var(--danger);color:var(--danger);background:var(--danger-s);border-radius:var(--r);padding:15px;text-align:center;font-weight:700;font-size:15px;margin-top:6px}
.newscard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px}
.newscard .d{color:var(--mut);font-size:12px}
.newscard h3{font-size:18px;margin:6px 0}
.newscard a{color:var(--acc);font-weight:700;font-size:14px;text-decoration:none;display:inline-flex;gap:6px;align-items:center;margin-top:8px}
.note{color:var(--mut);font-size:13px;line-height:1.6;margin:2px 0 8px}
.compass-mini{animation:spin 26s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:720px){.pSide{display:none}.pBtn{float:none;margin:14px 0 0}}
</style>
</head>
<body>
<div class="controls">
  <div class="brandmini"><span id="cmark"></span> KOMPASS · Redesign</div>
  <div class="seg" id="styleSeg">
    <span class="lbl">Стиль</span>
    <button data-s="v1" class="on">Вариант 1 · синий+серебро</button>
    <button data-s="v2">Вариант 2 · компас+красный</button>
  </div>
  <div class="seg" id="themeSeg">
    <span class="lbl">Тема</span>
    <button data-t="dark" class="on">Тёмная</button>
    <button data-t="light">Светлая</button>
  </div>
</div>

<div class="wrap">
  <div class="sec-h">Бренд и палитра</div>
  <div class="brandrow">
    <div class="brandcard">
      <div class="logolock">
        <span class="logomark" id="logoBig"></span>
        <div><div class="logotext">KOMPASS</div><div class="logotag" id="tagline">ВСЕ ДОКУМЕНТЫ · ОДНО ПРИЛОЖЕНИЕ</div></div>
      </div>
      <div class="pal" id="pal"></div>
    </div>
    <div class="brandcard" style="flex:1.4">
      <div class="frameLabel">Переработанные иконки (адаптируются под стиль)</div>
      <div class="icongrid" id="iconGrid"></div>
    </div>
  </div>

  <div class="sec-h">Панель оператора — «Очередь заявок»</div>
  <div class="panelMock" id="panelMock"></div>

  <div class="sec-h">Мобильное приложение</div>
  <div class="phones" id="phones"></div>
</div>

<script>
const S={style:'v1',theme:'dark'};
const root=document.documentElement;

/* ---------- SVG иконки ---------- */
const svg=(p,vb='0 0 24 24')=>`<svg viewBox="${vb}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
const I={
 queue:svg('<rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="18" height="4" rx="1"/><rect x="3" y="16" width="18" height="4" rx="1"/>'),
 search:svg('<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>'),
 plus:svg('<path d="M12 5v14M5 12h14"/>'),
 clock:svg('<circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/>'),
 grid:svg('<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>'),
 dash:svg('<path d="M4 13a8 8 0 0 1 16 0"/><path d="M12 13l4-3"/><circle cx="12" cy="13" r="1.4" fill="currentColor"/>'),
 users:svg('<circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.5a3 3 0 0 1 0 5.8M20.5 20a5 5 0 0 0-3-4.6"/>'),
 office:svg('<rect x="4" y="3" width="16" height="18" rx="1.5"/><path d="M8 7h2M8 11h2M8 15h2M14 7h2M14 11h2M14 15h2"/>'),
 chart:svg('<path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>'),
 shield:svg('<path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/><path d="M9 12l2 2 4-4"/>'),
 gear:svg('<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/>'),
 help:svg('<circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 1 1 3.5 2.3c-.8.4-1 .9-1 1.7M12 17h.01"/>'),
 doc:svg('<path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4M9 13h6M9 17h6"/>'),
 tag:svg('<path d="M3 12l8-8h8v8l-8 8z"/><circle cx="15" cy="9" r="1.4" fill="currentColor"/>'),
 news:svg('<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 9h6M7 13h10M7 16h5"/>'),
 banner:svg('<rect x="3" y="6" width="18" height="12" rx="2"/><path d="M3 10h18"/>'),
 pipa:svg('<path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/><path d="M12 8v4M12 15h.01"/>'),
 key:svg('<circle cx="8" cy="15" r="4"/><path d="M11 12l8-8 2 2M16 7l2 2"/>'),
 out:svg('<path d="M14 4h4a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-4M10 12h9M16 8l4 4-4 4"/>'),
 globe:svg('<circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/>'),
 bot:svg('<rect x="4" y="8" width="16" height="11" rx="3"/><path d="M12 4v4M9 13h.01M15 13h.01M9 16h6"/><path d="M2 12v3M22 12v3"/>'),
 folder:svg('<path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>'),
 receipt:svg('<path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/>'),
 chat:svg('<path d="M4 5h16v11H9l-4 4z"/>'),

/* цвета для «цветных» иконок варианта 2 */
const CAT={acc:'var(--acc)',ok:'var(--ok)',violet:'var(--violet)',warn:'var(--warn)',red:'var(--acc2)',blue:'#3B82F6'};
function iconBox(name,catVar){
  // v2 = цветная плитка, v1 = единый синий/серебристый
  const v2 = S.style==='v2';
  const col = v2 ? catVar : 'var(--acc)';
  const bg  = v2 ? `color-mix(in srgb, ${col} 16%, transparent)` : 'var(--acc-s)';
  return `<span class="ic" style="background:${bg};color:${col}">${I[name]}</span>`;
}

/* ---------- Компас-лого (SVG) ---------- */
function compass(size){
  var src = S.style==='v2' ? 'assets/mark-v2.png' : 'assets/mark-v1.png';
  var r = Math.round(size*(S.style==='v2'?0.22:0.16));
  return '<img src="'+src+'" width="'+size+'" height="'+size+'" style="border-radius:'+r+'px;object-fit:cover;display:block;box-shadow:0 2px 8px rgba(0,0,0,.3)" alt="KOMPASS">';
}

function renderPanel(){
  const side=SIDE.map(x=>x.g?`<div class="pGroup">${x.g}</div>`
    :`<div class="pItem ${x.on?'on':''}">${I[x.i]}<span>${x.t}</span>${x.n?`<span class="cnt">${x.n}</span>`:''}</div>`).join('');
  const cards=QUEUE.map(q=>{
    const av=q.img?`<div class="av" style="background:linear-gradient(135deg,#c98a63,#8a5a3a)">Е</div>`
      :`<div class="av" style="background:${q.cs}">${q.n[0].toUpperCase()}</div>`;
    const tags=q.tags.map(([t,c])=>{const[b,f]=TC[c];return `<span class="chip" style="background:${b};color:${f}">${t}</span>`}).join('');
    return `<div class="qcard ${q.fl?'flag':''}">${av}
      <div class="qinfo"><div class="qname"><b>${q.n}</b>${tags}</div><div class="qmeta">${q.id} · ${q.ph}</div></div>
      <div class="qright"><span class="qstatus">${q.st}</span><span class="qassign">${I.user}Сергей</span></div></div>`;
  }).join('');
  document.getElementById('panelMock').innerHTML=`
    <div class="pSide"><div class="brand">${compass(26)}<b>KOMPASS</b></div>
      <div class="pUser"><b>Сергей</b><small>Супер-Админ · Все офисы</small></div>${side}</div>

      <div class="tabs"><div class="tab on">Мои (8)</div><div class="tab">Новые (1)</div><div class="tab">Все (26)</div><div class="tab">Завершённые</div></div>
      ${cards}
    </div>`;
}

  return `<div class="nav">${items.map(([i,t])=>`<a class="${t===active?'on':''}">${I[i]}<span>${t}</span></a>`).join('')}</div>`;
}

/* ---------- Бренд-секция ---------- */
function renderBrand(){
  document.getElementById('logoBig').innerHTML=compass(60);
  document.getElementById('cmark').innerHTML=compass(22);
  document.getElementById('tagline').textContent = S.style==='v2'?'НАДЁЖНОСТЬ · ТОЧНОСТЬ · БЕЗОПАСНОСТЬ':'ВСЕ ДОКУМЕНТЫ · ОДНО ПРИЛОЖЕНИЕ';
  const vars=['--acc','--acc2','--ok','--violet','--warn','--danger'];
  const names=S.style==='v2'?['Синий','Красный','Успех','Справки','Пенсии','ЧС']:['Акцент','Акцент','Успех','Доп.','Внимание','ЧС'];
  document.getElementById('pal').innerHTML=vars.map((v,i)=>`<div class="sw" style="background:var(${v})"><span>${names[i]}</span></div>`).join('');
  const ics=[['id','ID / Виза','acc'],['car','Права','ok'],['doc','Налоги','red'],['shield','Страховка','violet'],['book','Переводы','warn'],['folder','Прочее','blue'],['bot','AI-чат','violet'],['receipt','Услуги','acc']];
  document.getElementById('iconGrid').innerHTML=ics.map(([n,t,c])=>`<div class="icell">${iconBox(n,CAT[c])}<small>${t}</small></div>`).join('');
}

function renderAll(){renderBrand();renderPanel();renderPhones();}
function setState(k,v){S[k]=v;root.dataset[k==='style'?'style':'theme']=v;
  document.querySelectorAll(`#${k}Seg button`).forEach(b=>b.classList.toggle('on',(b.dataset.s||b.dataset.t)===v));renderAll();}
document.getElementById('styleSeg').addEventListener('click',e=>{if(e.target.dataset.s)setState('style',e.target.dataset.s)});
document.getElementById('themeSeg').addEventListener('click',e=>{if(e.target.dataset.t)setState('theme',e.target.dataset.t)});
renderAll();
</script>
