<div class="info"><p>Факт первого использования каждой функции фиксируется автоматически в системе (<code>firstUsedAt</code>) и хранится в журнале активности (<code>usageLog</code>).</p></div>

<h2>5. Сроки зачисления</h2>

    body:`
<div class="highlight"><p>We want you to be happy with Kompass. If something isn't right, here's how to get a refund.</p></div>

<h2>1. Refund Eligibility</h2>
<p>You may request a full refund within <strong>7 calendar days</strong> of payment, provided both conditions are met:</p>
<ul>
<li>No more than 7 days have passed since payment</li>
<li>You have not used any paid features of the subscription</li>
</ul>
<div class="warn"><p>Once you have used even one paid feature, a refund is not available — even if it has been fewer than 7 days since payment.</p></div>

<h2>2. What Counts as Using a Paid Feature</h2>
<p>Any of the following actions counts as use:</p>
<ul>
<li>Sending a message via direct specialist chat (Premium)</li>
<li>Activating automatic SMS interception (Basic and above)</li>
<li>Viewing refund history (Basic and above)</li>
<li>Priority processing applied to an application (Premium)</li>
<li>Receiving a push notification through the subscription</li>
</ul>
<div class="info"><p>The timestamp of first use of each feature is recorded automatically in the system (<code>firstUsedAt</code>) and stored in the activity log (<code>usageLog</code>).</p></div>

<h2>3. Scenarios</h2>
<div class="scenario-card">

<div class="scenario-card">

<div class="scenario-card">

</div>
<div class="scenario-card">

<li>Subject line: <strong>"Subscription Refund"</strong></li>
<li>Include the phone number linked to your account and the payment date</li>
</ul>
<p>We will review your request within <strong>3 business days</strong> and notify you of the decision.</p>

<h2>5. Refund Processing Time</h2>
<p>Once approved, refunds are credited to your card within <strong>5–10 business days</strong> depending on your bank and payment processor.</p>

<h2>6. Cancellation vs Refund</h2>
<ul>
<li><strong>Cancellation</strong>: stops auto-renewal. Access to paid features continues until the end of the billing period. Done in profile settings.</li>
<li><strong>Refund</strong>: returns payment for the current period if the conditions above are met. Requested by email only.</li>
</ul>

<h2>7. Exceptions — No Refund</h2>
<ul>
<li>Violation of the <a href="/terms.html" style="color:var(--silver)">Terms of Use</a></li>

<p style="color:var(--gray);font-size:13px;margin-top:8px">Response time: within 3 business days</p>
</div>`

let lang='ru';
function setLang(l){
  lang=l;document.documentElement.lang=l;document.body.className=l==='ko'?'lang-ko':'';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(content[l][k]!==undefined)el.innerHTML=content[l][k];});
  document.getElementById('doc-body').innerHTML=content[l].body;
  document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.toggle('active',b.textContent.trim()===(l==='ru'?'РУС':l==='ko'?'한국어':'ENG'));});
  const t={ru:'Политика возврата — Kompass',ko:'환불정책 — Kompass',en:'Refund Policy — Kompass'};document.title=t[l];
}
